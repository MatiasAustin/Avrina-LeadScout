  <head>
    <meta charset="UTF-8" />

    <!-- BUILD VERSION: 0.3.1 -->
    
    <!-- POLYFILL: Mencegah error "process is not defined" di browser/Vercel -->
    <script>
      window.process = { env: {} };
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              // We override 'slate' to point to CSS variables. 
              // This allows React to swap themes by just changing the variable values.
              slate: {
                50: 'var(--slate-50)',
                100: 'var(--slate-100)',
                200: 'var(--slate-200)',
                300: 'var(--slate-300)',
                400: 'var(--slate-400)',
                500: 'var(--slate-500)',
                600: 'var(--slate-600)',
                700: 'var(--slate-700)',
                800: 'var(--slate-800)',
                900: 'var(--slate-900)',
                950: 'var(--slate-950)',
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--slate-100); /* Uses the variable now */
        color: var(--slate-900);
      }
      /* Custom scrollbar for cleaner look */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--slate-100); 
      }
      ::-webkit-scrollbar-thumb {
        background: var(--slate-300); 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--slate-400); 
      }
      
      /* Default Theme Variables (Will be overwritten by React if needed) */
      :root {
        --slate-50: #f8fafc;
        --slate-100: #f1f5f9;
        --slate-200: #e2e8f0;
        --slate-300: #cbd5e1;
        --slate-400: #94a3b8;
        --slate-500: #64748b;
        --slate-600: #475569;
        --slate-700: #334155;
        --slate-800: #1e293b;
        --slate-900: #0f172a;
        --slate-950: #020617;
      }

      /* LOVE BUBBLE ANIMATION */
      .love-bubble-container {
        position: fixed;
        bottom: -50px;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }

      .love-bubble {
        position: absolute;
        bottom: -50px;
        opacity: 0;
        animation: floatUp linear forwards;
        font-size: 24px;
      }

      @keyframes floatUp {
        0% {
          transform: translateY(0) translateX(0) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 0.6;
        }
        50% {
          transform: translateY(-50vh) translateX(15px) rotate(10deg);
        }
        100% {
          transform: translateY(-120vh) translateX(-15px) rotate(-10deg);
          opacity: 0;
        }
      }
    </style>
