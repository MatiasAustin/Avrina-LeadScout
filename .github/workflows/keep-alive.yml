name: Supabase Keep-Alive

on:
  schedule:
    # Runs at 00:00 UTC every Monday and Thursday (2 times a week)
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # Install only the necessary dependencies for the script
        run: npm install @supabase/supabase-js tsx

      - name: Run Keep-Alive Script
        env:
          # Use your repository secrets to provide these values
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npx tsx scripts/supabase-keep-alive.ts
